name: CI

on:
  push:
    branches: [main, "001-*"]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests ─────────────────────────────────────────────────────────────
  # All external calls (Anthropic, Qdrant, Exa) are mocked.
  # No API keys needed. This is the hard gate — PRs must pass here.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junit-xml=unit-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: backend/unit-results.xml

  # ── Eval tests ─────────────────────────────────────────────────────────────
  # Calls the real LLM pipeline (analyst, router, grounding) with fixed context,
  # then evaluates output quality with DeepEval metrics.
  #
  # Required secrets:
  #   ANTHROPIC_API_KEY — used by analyst / router / grounding nodes
  #   OPENAI_API_KEY    — used by DeepEval's evaluation LLM (HallucinationMetric, GEval)
  #
  # Tests skip automatically when either key is absent, so this job never
  # blocks if secrets aren't configured. Set continue-on-error: true because
  # LLM output is non-deterministic — eval tests are quality signals, not
  # hard gates the way unit tests are.
  eval-tests:
    name: Eval Tests (LLM quality)
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval tests
        run: pytest tests/eval/ -v --tb=short --junit-xml=eval-results.xml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-test-results
          path: backend/eval-results.xml

  # ── Frontend build ─────────────────────────────────────────────────────────
  # Verifies the Vite build succeeds (catches import errors, missing deps, etc.)
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app
          VITE_AUTH_USER: ci
          VITE_AUTH_PASS: ci
